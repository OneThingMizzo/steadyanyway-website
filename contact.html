<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact | Steady Anyway</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Steady Anyway home">
        <img src="assets/steady-anyway-horizontal-logo-cropped.png" alt="Steady Anyway" />
      </a>
      <button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false"><span></span><span></span><span></span></button>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="podcast.html">Podcast</a>
        <a href="about.html">About</a>
        <a class="active" href="contact.html">Contact</a>
      </nav>
      <div class="socials" aria-label="Social links">
        <a class="youtube-icon" href="https://www.youtube.com/@SteadyAnyway" target="_blank" rel="noreferrer" aria-label="Steady Anyway YouTube channel"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21.6 7.2a3 3 0 0 0-2.1-2.1C17.7 4.6 12 4.6 12 4.6s-5.7 0-7.5.5a3 3 0 0 0-2.1 2.1A31.5 31.5 0 0 0 2 12a31.5 31.5 0 0 0 .4 4.8 3 3 0 0 0 2.1 2.1c1.8.5 7.5.5 7.5.5s5.7 0 7.5-.5a3 3 0 0 0 2.1-2.1A31.5 31.5 0 0 0 22 12a31.5 31.5 0 0 0-.4-4.8ZM10 15.5v-7l6 3.5-6 3.5Z"/></svg></a>
        <a class="instagram-icon" href="contact.html" aria-label="Instagram"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2"/></svg></a>
        <a class="email-icon" href="contact.html" aria-label="Email"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18v12H3z"/><path d="m3 7 9 7 9-7"/></svg></a>
      </div>
    </header>

    <main class="page-shell">
      <section class="page-hero contact-layout">
        <div>
          <h1>Have a story, question, or episode idea?</h1>
          <div class="accent-line"></div>
          <p>Send a note about the podcast, a conversation topic, a guest idea, or what staying steady looks like in your own season.</p>
          <div class="contact-links">
            <a href="mailto:hello@steadyanyway.com">hello@steadyanyway.com</a>
            <a href="podcast.html">Browse episodes</a>
          </div>
        </div>
        <form class="contact-form" id="contactForm">
          <label>
            <span class="field-label">Name</span>
            <input name="name" type="text" autocomplete="name" required />
          </label>
          <label>
            <span class="field-label">Email</span>
            <input name="email" type="email" autocomplete="email" required />
          </label>
          <label>
            <span class="field-label">Message</span>
            <textarea name="message" rows="5" required></textarea>
          </label>
          <button class="btn btn-primary" type="submit">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 11.5 21 3l-8.5 18-2-7.5L3 11.5Z"/></svg>
            <span class="btn-label">Send message</span>
          </button>
          <p class="form-note" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
